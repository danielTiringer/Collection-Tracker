version: '3.7'

services:
  php:
    build:
      context: ./src/docker
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION}
      target: dev
    container_name: collection-tracker-application
    environment:
      - WEB_DOCUMENT_ROOT=/var/www/html/webroot
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
    ports:
      - '4000:80'
    depends_on:
      - database
    links:
      - database
    networks:
      - collection-tracker

  database:
    image: mysql:8
    container_name: collection-tracker-database
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - collection-data:/var/lib/mysql
    networks:
      - collection-tracker

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: collection-tracker-admin
    depends_on:
      - database
    environment:
      PMA_HOST: database
    ports:
      - '4010:80'
    links:
      - database
    networks:
      - collection-tracker

networks:
  collection-tracker:

volumes:
  collection-data:
